version: 2

models:
  - name: mart_gmv_daily
    description: >
      GMV, AOV, and category share at (order_date, category) grain.
      Excludes canceled/unavailable orders — GMV reflects transactions that
      actually occurred, not gross submitted order value. daily_aov is the
      category's slice of spend per order that included it (daily_gmv /
      order_count), not the full order total for orders touching that
      category. category_gmv_share sums to ~1.0 per order_date (floating
      point rounding, not exact).
    columns:
      - name: order_date
        tests:
          - not_null

  - name: mart_delivery_performance
    description: >
      Delivery performance at (order_month, customer_state) grain.
      Deliberately not filtered or segmented by order_status, consistent
      with int_orders_enriched's is_late definition — lateness reflects
      actual delivery events, independent of administrative status.
      late_delivery_rate and avg_days_early use avg()'s built-in null
      handling: orders with no delivery timestamp yet are excluded from
      both the numerator and denominator, rather than treated as on-time
      or causing a divide-by-zero.
    columns:
      - name: order_month
        tests:
          - not_null

  - name: mart_customer_cohorts
    description: >
      Monthly retention cohorts at (cohort_month, order_month) grain.
      cohort_month is a customer's first-ever order month, identified via
      customer_unique_id (not customer_id, which is per-order and would
      make every order look like a first-time purchase). No order_status
      filter — a canceled order still represents genuine customer
      engagement/activity with the platform, which is what this mart
      measures, distinct from GMV (actual revenue) or delivery performance
      (fulfillment events). retention_rate is [fraction 0-1 / percentage
      0-100 — state which you chose]. Rows where cohort_month = order_month
      always show 100% retention by definition (verified).
    columns:
      - name: cohort_month
        tests:
          - not_null